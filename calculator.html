    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="calculator-wrapper p-4 rounded shadow ">
            <div class="calculator-display mb-4">
                <input type="text" id="display" class="form-control form-control-lg text-end" readonly value="0">
                <small id="expression" class="text-muted  d-block text-end mt-1"></small>
            </div>

            <div class="calculator-buttons">
                <div class="row g-2">
                    <div class="col-3">
                        <button class="btn btn-danger w-100 py-3" id="clearAll">
                            AC
                        </button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-warning w-100 py-3" id="delete">
                            <i class="bi bi-backspace"></i>
                        </button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-secondary w-100 py-3" id="percent">%</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-primary w-100 py-3 operator" data-op="/">÷</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="7">7</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="8">8</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="9">9</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-primary w-100 py-3 operator" data-op="*">×</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="4">4</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="5">5</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="6">6</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-primary w-100 py-3 operator" data-op="-">−</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="1">1</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="2">2</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="3">3</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-primary w-100 py-3 operator" data-op="+">+</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-3 number" data-num="0">0</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-dark w-100 py-3" id="decimal">.</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-success w-100 py-3" id="equals">
                            <i class="bi bi-equals"></i> =
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
